{% extends 'core/base.html' %}

{% block content %}
<style>
  form p { margin-bottom: 1.25rem; }
  form label { font-weight: 600; margin-bottom: 0.5rem; display: inline-block; }
  form input[type="text"], form input[type="file"], form textarea {
    display: block; width: 100%; padding: 0.375rem 0.75rem;
    font-size: 1rem; border: 1px solid var(--bs-border-color); border-radius: 0.375rem;
    background-color: var(--bs-body-bg); color: var(--bs-body-color);
  }
  .helptext { display: block; font-size: 0.875em; color: var(--bs-secondary-color); margin-top: 0.25rem; }
</style>

<script>
  // Hide irrelevant email fields for the tester tool
  document.addEventListener("DOMContentLoaded", function() {
      const idsToHide = ['id_subject', 'id_cover_letter', 'id_resume_pdf', 'id_attachments'];
      idsToHide.forEach(id => {
          const el = document.getElementById(id);
          if (el && el.parentElement) el.parentElement.style.display = 'none';
      });
  });
</script>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0 bg-body">
        <div class="card-header bg-transparent border-bottom-0 pt-4 pb-0 px-4">
          <h2 class="h4 mb-0 fw-bold text-body">Lead Extraction Tester</h2>
        </div>
        <div class="card-body p-4">

          <div class="alert alert-warning shadow-sm border-warning-subtle" role="alert">
            <strong>Guest Mode:</strong> Upload a file or paste text to safely test our parsing engine. No emails will be sent.
          </div>

          <form id="apply-form" enctype="multipart/form-data">
            {% csrf_token %}
            <div id="form-fields-container" class="bg-body-tertiary p-4 rounded mb-4 border shadow-sm">
              {{ form.as_p }}
            </div>
            <div class="d-grid">
              <button id="submit-btn" type="submit" class="btn btn-warning btn-lg fw-bold text-dark">
                Test Extraction Engine
              </button>
            </div>
          </form>

          <div id="loading-overlay" class="d-none text-center py-5">
            <div id="loading-spinner" class="spinner-border text-warning mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
            <h4 id="loading-title" class="fw-bold text-body">Analyzing Document...</h4>
          </div>

          <div id="guest-results" class="d-none mt-4">
             <h4 class="text-success fw-bold mb-3" id="guest-count"></h4>
             <pre class="bg-dark text-success p-3 rounded overflow-auto" style="max-height: 400px; border: 1px solid #333;"><code id="guest-json"></code></pre>
             <button onclick="window.location.reload()" class="btn btn-outline-warning text-dark mt-3">Test Another File</button>
             <a href="/accounts/login/" class="btn btn-primary mt-3 ms-2">Log in to Send</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('apply-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const submitBtn = document.getElementById('submit-btn');
    const loadingOverlay = document.getElementById('loading-overlay');

    submitBtn.disabled = true;
    document.getElementById('form-fields-container').classList.add('d-none');
    submitBtn.classList.add('d-none');
    loadingOverlay.classList.remove('d-none');

    try {
      let formData = new FormData(form);
      
      let extractRes = await fetch(window.location.href, {
          method: 'POST', body: formData, headers: {'X-Requested-With': 'XMLHttpRequest'}
      });
      
      let extractData;
      try { extractData = await extractRes.json(); } 
      catch (parseErr) { throw new Error(`Server crashed during extraction! Status: ${extractRes.status}.`); }
      
      if (!extractRes.ok || extractData.error) throw new Error(extractData.error || `Extraction failed! Status: ${extractRes.status}.`);

      loadingOverlay.classList.add('d-none');
      document.getElementById('guest-results').classList.remove('d-none');
      document.getElementById('guest-count').innerText = `Successfully Extracted ${extractData.count} Leads!`;
      document.getElementById('guest-json').innerText = JSON.stringify(extractData.leads, null, 2);

    } catch (err) {
        alert(err.message);
        window.location.reload();
    }
  });
</script>
{% endblock %}
