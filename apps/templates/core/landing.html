{% extends 'core/base.html' %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0 bg-body">
        <div class="card-body p-4 text-center">
          <h1 class="h3 mb-3 fw-bold text-body">Welcome to Applymatic</h1>
          <p class="text-secondary mb-4">
            Upload your leads document, attach your resume, write a personalized cover letter, and deploy automated applications directly through your Gmail.
          </p>

          <div class="d-grid gap-3 mb-4">
            <a class="btn btn-primary btn-lg fw-bold" href="/accounts/login/">
              <i class="bi bi-google me-2"></i> Continue with Google
            </a>
            <a class="btn btn-outline-secondary btn-lg fw-bold" href="/guest/test/">
              <i class="bi bi-file-earmark-text me-2"></i> Extract companies
            </a>
          </div>

          <hr class="my-4 border-secondary">

          <small class="text-secondary d-block">
          </small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
